<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title description">
  <title id="title">掲示場面を模した第一印象テスト用モックアップ</title>
  <desc id="description">大学の廊下に複数の掲示物が並び、中央にAIデザインゼミの青い作例ポスターが掲示されている合成作例</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#27251f" flood-opacity="0.24"/>
    </filter>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ddd7ca"/>
      <stop offset="1" stop-color="#aaa496"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#wall)"/>
  <rect y="584" width="1200" height="216" fill="#66635c"/>
  <path d="M0 584H1200M0 626H1200" stroke="#f6f1e7" stroke-opacity="0.35" stroke-width="3"/>
  <g opacity="0.8" filter="url(#shadow)">
    <rect x="54" y="170" width="210" height="300" fill="#f7f4ec"/>
    <rect x="80" y="205" width="155" height="32" fill="#c46a91"/>
    <rect x="80" y="260" width="120" height="12" fill="#69665e"/>
    <rect x="80" y="287" width="150" height="8" fill="#b7b1a5"/>
    <rect x="80" y="307" width="142" height="8" fill="#b7b1a5"/>
    <circle cx="159" cy="383" r="52" fill="#e6d34b"/>
  </g>
  <g opacity="0.72" filter="url(#shadow)">
    <rect x="936" y="150" width="205" height="285" fill="#f7f4ec"/>
    <rect x="963" y="181" width="150" height="70" fill="#283f54"/>
    <rect x="963" y="278" width="126" height="13" fill="#69665e"/>
    <rect x="963" y="310" width="150" height="8" fill="#b7b1a5"/>
    <rect x="963" y="330" width="139" height="8" fill="#b7b1a5"/>
    <rect x="963" y="350" width="146" height="8" fill="#b7b1a5"/>
  </g>
  <g filter="url(#shadow)" transform="translate(338 78)">
    <rect width="525" height="350" fill="#1748c6"/>
    <circle cx="426" cy="66" r="106" fill="#f4e538"/>
    <path d="M0 265L316 350H0Z" fill="#161613"/>
    <text x="30" y="38" fill="#fffdf8" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="2">AI × DESIGN LAB / SAMPLE</text>
    <text x="28" y="174" fill="#fffdf8" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="82" font-weight="600" letter-spacing="-5">つくる？</text>
    <text x="34" y="217" fill="#f4e538" font-family="Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-size="16" font-weight="700">考える → 選ぶ → つくる → 確かめる</text>
    <text x="34" y="306" fill="#fffdf8" font-family="Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-size="13" font-weight="700">コードが書けなくても、デザインは始められる。</text>
    <text x="425" y="72" fill="#161613" font-family="Didot, serif" font-size="40" text-anchor="middle">0.2</text>
  </g>
  <g opacity="0.62">
    <rect x="77" y="92" width="13" height="38" rx="6" fill="#4b4943"/>
    <circle cx="83.5" cy="91" r="10" fill="#4b4943"/>
    <rect x="1083" y="70" width="13" height="38" rx="6" fill="#4b4943"/>
    <circle cx="1089.5" cy="69" r="10" fill="#4b4943"/>
  </g>
  <rect x="22" y="716" width="252" height="48" rx="24" fill="#161613"/>
  <text x="148" y="747" fill="#fffdf8" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1" text-anchor="middle">SAMPLE MOCKUP / 合成作例</text>
</svg>

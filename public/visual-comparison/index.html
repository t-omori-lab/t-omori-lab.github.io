<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" href="data:," />
  <title>Visual comparison study</title>
  <style>
    :root {
      --ink: #070807;
      --paper: #f2f0e8;
      --muted: #9a9a93;
      --line: rgba(242, 240, 232, .18);
      --line-strong: rgba(242, 240, 232, .42);
      --acid: #dfff38;
      --blue: #315cff;
      --panel: rgba(8, 9, 8, .94);
      --slot-left: 28px;
      --slot-top: 22px;
      font-synthesis: none;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--ink); color: var(--paper); }
    body { font-family: "Avenir Next", "Helvetica Neue", sans-serif; }
    button { font: inherit; }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: stretch;
      background:
        radial-gradient(circle at 80% 10%, rgba(49,92,255,.12), transparent 34%),
        #030403;
    }

    .viewport-shell { position: relative; width: 100%; height: 100%; overflow: hidden; transition: width .28s ease, height .28s ease, border-radius .28s ease; }
    .viewport-shell[data-view="mobile"] {
      place-self: center;
      width: min(390px, calc(100vw - 24px));
      height: min(844px, calc(100vh - 24px));
      border: 1px solid rgba(242,240,232,.32);
      border-radius: 18px;
      box-shadow: 0 40px 120px rgba(0,0,0,.72);
    }

    .context-frame { width: 100%; height: 100%; border: 0; background: #111; pointer-events: none; }
    .context-shade { position: absolute; inset: 0; pointer-events: none; background: linear-gradient(180deg, rgba(0,0,0,.06), transparent 25%, rgba(0,0,0,.08)); }
    .live-logo {
      position: absolute;
      z-index: 3;
      left: var(--slot-left);
      top: var(--slot-top);
      display: block;
      height: auto;
      max-height: 62px;
      object-fit: contain;
      object-position: left center;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.48));
      transition: width .18s cubic-bezier(.2,.8,.2,1), opacity .12s linear;
    }

    .context-meta {
      position: absolute;
      z-index: 4;
      top: 24px;
      right: 24px;
      max-width: 42vw;
      text-align: right;
      pointer-events: none;
      text-shadow: 0 2px 12px rgba(0,0,0,.82);
    }
    .context-meta strong, .context-meta span { display: block; font-family: ui-monospace, "SFMono-Regular", monospace; text-transform: uppercase; }
    .context-meta strong { font-size: 9px; line-height: 1.2; letter-spacing: .16em; }
    .context-meta span { margin-top: 6px; color: #aaa; font-size: 8px; line-height: 1.25; letter-spacing: .12em; }

    .panel {
      position: fixed;
      z-index: 20;
      left: 14px;
      right: 14px;
      bottom: 14px;
      max-height: 64vh;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      box-shadow: 0 36px 120px rgba(0,0,0,.64);
      backdrop-filter: blur(24px) saturate(120%);
      transition: transform .28s cubic-bezier(.2,.8,.2,1), opacity .2s ease;
    }
    .panel.is-hidden { transform: translateY(calc(100% + 28px)); opacity: 0; pointer-events: none; }

    .panel-head {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 10px 12px 10px 16px;
      border-bottom: 1px solid var(--line);
    }
    .study-title { min-width: 0; display: flex; align-items: baseline; gap: 14px; }
    .study-title strong { flex: none; font-family: "Iowan Old Style", "Times New Roman", serif; font-size: 16px; font-weight: 400; letter-spacing: -.02em; }
    .study-title span { overflow: hidden; color: var(--muted); font: 600 8px/1.3 ui-monospace, "SFMono-Regular", monospace; letter-spacing: .14em; text-transform: uppercase; white-space: nowrap; text-overflow: ellipsis; }
    .tools { display: flex; align-items: stretch; gap: 6px; flex: none; }
    .tool-group { display: flex; }
    .tool {
      min-height: 34px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--paper);
      padding: 0 10px;
      cursor: pointer;
      font: 700 8px/1 ui-monospace, "SFMono-Regular", monospace;
      letter-spacing: .1em;
      text-transform: uppercase;
    }
    .tool + .tool { border-left: 0; }
    .tool:hover, .tool:focus-visible, .tool[aria-pressed="true"] { outline: 0; border-color: var(--paper); background: var(--paper); color: var(--ink); }
    .tool:disabled { color: #5f615e; cursor: not-allowed; }
    .tool:disabled:hover { background: transparent; border-color: var(--line); color: #5f615e; }
    .scale-value { min-width: 54px; color: var(--acid); }
    .view-tool { min-width: 76px; }
    .hide-tool { margin-left: 2px; }

    .legend {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding: 9px 16px;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      font: 600 8px/1.3 ui-monospace, "SFMono-Regular", monospace;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .legend b { color: var(--acid); font-weight: 700; }

    .grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); max-height: calc(64vh - 96px); overflow: auto; scrollbar-color: #454640 transparent; }
    .card {
      position: relative;
      min-width: 0;
      min-height: 174px;
      padding: 14px 14px 12px;
      border: 0;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: transparent;
      color: var(--paper);
      text-align: left;
      cursor: pointer;
    }
    .card:nth-child(3n) { border-right: 0; }
    .card:hover { background: rgba(255,255,255,.035); }
    .card:focus-visible { outline: 1px solid var(--paper); outline-offset: -3px; }
    .card[aria-pressed="true"] { background: rgba(49,92,255,.14); box-shadow: inset 0 0 0 1px var(--blue); }
    .card[aria-pressed="true"]::before { content: ""; position: absolute; left: 0; top: 0; width: 3px; height: 100%; background: var(--acid); }
    .card-head { display: flex; justify-content: space-between; gap: 14px; min-height: 34px; }
    .card-code { display: block; color: var(--acid); font: 750 9px/1 ui-monospace, "SFMono-Regular", monospace; letter-spacing: .14em; }
    .card-name { display: block; margin-top: 6px; overflow: hidden; font-size: 11px; line-height: 1.2; letter-spacing: .02em; white-space: nowrap; text-overflow: ellipsis; }
    .card-note { max-width: 116px; color: var(--muted); font-size: 8px; line-height: 1.35; text-align: right; }
    .master { height: 64px; margin-top: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: linear-gradient(90deg, transparent, rgba(255,255,255,.025), transparent); }
    .master img { display: block; max-width: min(94%, 330px); max-height: 56px; width: auto; height: auto; }
    .samples { display: flex; gap: 16px; align-items: flex-end; min-height: 30px; margin-top: 8px; overflow: hidden; }
    .sample { min-width: 0; }
    .sample span { display: block; margin-bottom: 5px; color: #696b68; font: 650 7px/1 ui-monospace, "SFMono-Regular", monospace; letter-spacing: .08em; }
    .sample img { display: block; max-height: 34px; width: auto; height: auto; }

    .dock {
      position: fixed;
      z-index: 18;
      left: 14px;
      bottom: 14px;
      display: flex;
      align-items: stretch;
      border: 1px solid var(--line-strong);
      background: rgba(8,9,8,.96);
      box-shadow: 0 18px 60px rgba(0,0,0,.58);
      transform: translateY(80px);
      opacity: 0;
      pointer-events: none;
      transition: transform .25s ease, opacity .2s ease;
    }
    .panel.is-hidden + .dock { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .dock button { min-width: 36px; min-height: 36px; border: 0; border-right: 1px solid var(--line); background: transparent; color: var(--paper); cursor: pointer; }
    .dock button:hover, .dock button:focus-visible { outline: 0; background: var(--paper); color: var(--ink); }
    .dock .show { padding: 0 12px; background: var(--paper); color: var(--ink); font: 750 8px/1 ui-monospace, "SFMono-Regular", monospace; letter-spacing: .1em; }
    .dock .arrow { font-size: 15px; }
    .dock-status { min-width: 92px; display: grid; place-items: center; padding: 0 10px; color: var(--muted); font: 700 8px/1 ui-monospace, "SFMono-Regular", monospace; letter-spacing: .1em; }

    .fatal { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; padding: 24px; background: #090909; color: #ff8b78; font: 600 14px/1.5 ui-monospace, monospace; }

    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .card:nth-child(3n) { border-right: 1px solid var(--line); }
      .card:nth-child(2n) { border-right: 0; }
      .legend span:last-child { display: none; }
    }

    @media (max-width: 620px) {
      .viewport-shell[data-view="mobile"] { width: 100%; height: 100%; border: 0; border-radius: 0; }
      .context-meta { top: 82px; right: 18px; max-width: 45vw; }
      .panel { left: 8px; right: 8px; bottom: 8px; max-height: 61vh; }
      .panel-head { min-height: 54px; gap: 8px; padding-left: 12px; }
      .study-title strong { font-size: 13px; }
      .study-title span { display: none; }
      .tools { gap: 3px; }
      .view-group { display: none; }
      .tool { min-height: 32px; padding: 0 8px; }
      .scale-value { min-width: 46px; }
      .legend { display: none; }
      .grid { grid-template-columns: 1fr; max-height: calc(61vh - 54px); }
      .card, .card:nth-child(2n), .card:nth-child(3n) { min-height: 158px; border-right: 0; }
      .master { height: 58px; }
      .dock { left: 8px; bottom: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .viewport-shell, .live-logo, .panel, .dock { transition: none; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="viewport-shell" id="viewport-shell" data-view="desktop">
      <iframe class="context-frame" id="context-frame" title="Context preview"></iframe>
      <div class="context-shade"></div>
      <img class="live-logo" id="live-logo" alt="" />
      <div class="context-meta" aria-live="polite">
        <strong id="meta-code"></strong>
        <span id="meta-size"></span>
      </div>
    </div>
  </main>

  <section class="panel" id="panel" aria-label="Visual candidate comparison">
    <header class="panel-head">
      <div class="study-title">
        <strong id="study-title">Visual comparison</strong>
        <span id="study-subtitle"></span>
      </div>
      <div class="tools">
        <div class="tool-group view-group" role="group" aria-label="Context viewport">
          <button class="tool view-tool" id="desktop-view" type="button" aria-pressed="true">Desktop</button>
          <button class="tool view-tool" id="mobile-view" type="button" aria-pressed="false">Mobile</button>
        </div>
        <div class="tool-group" role="group" aria-label="Candidate scale">
          <button class="tool" id="scale-down" type="button" aria-label="Reduce candidate by 10 percent">−</button>
          <button class="tool scale-value" id="scale-reset" type="button" aria-label="Reset candidate scale to 100 percent">100%</button>
          <button class="tool" id="scale-up" type="button" aria-label="Enlarge candidate by 10 percent">＋</button>
        </div>
        <button class="tool hide-tool" id="hide-panel" type="button">Hide</button>
      </div>
    </header>
    <div class="legend">
      <span><b>Locked</b> context / slot / ordering</span>
      <span><b>Variable</b> candidate-specific width / responsive fit</span>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <nav class="dock" aria-label="Collapsed comparison controls">
    <button class="show" id="show-panel" type="button">Show study</button>
    <button class="arrow" id="previous" type="button" aria-label="Previous candidate">↑</button>
    <button class="arrow" id="next" type="button" aria-label="Next candidate">↓</button>
    <span class="dock-status" id="dock-status" aria-live="polite"></span>
  </nav>

  <script src="./study-data.js"></script>
  <script>
    (() => {
      const config = window.STUDY_CONFIG;
      if (!config || !Array.isArray(config.candidates) || config.candidates.length < 2) {
        document.body.innerHTML = '<div class="fatal">Invalid or missing study-data.js</div>';
        return;
      }

      const elements = {
        shell: document.querySelector('#viewport-shell'),
        frame: document.querySelector('#context-frame'),
        live: document.querySelector('#live-logo'),
        metaCode: document.querySelector('#meta-code'),
        metaSize: document.querySelector('#meta-size'),
        panel: document.querySelector('#panel'),
        grid: document.querySelector('#grid'),
        dock: document.querySelector('#dock-status'),
        title: document.querySelector('#study-title'),
        subtitle: document.querySelector('#study-subtitle'),
        desktop: document.querySelector('#desktop-view'),
        mobile: document.querySelector('#mobile-view'),
        scaleDown: document.querySelector('#scale-down'),
        scaleReset: document.querySelector('#scale-reset'),
        scaleUp: document.querySelector('#scale-up')
      };

      const state = { selected: 0, scale: 1, view: matchMedia('(max-width: 620px)').matches ? 'mobile' : 'desktop' };
      const clampScale = value => Math.min(2, Math.max(.5, Math.round(value * 10) / 10));
      const candidateAt = index => config.candidates[(index + config.candidates.length) % config.candidates.length];

      function slotForView() {
        return config.context[state.view] || { left: state.view === 'mobile' ? 22 : 28, top: state.view === 'mobile' ? 20 : 22 };
      }

      function applyView() {
        const slot = slotForView();
        document.documentElement.style.setProperty('--slot-left', `${slot.left}px`);
        document.documentElement.style.setProperty('--slot-top', `${slot.top}px`);
        elements.shell.dataset.view = state.view;
        elements.desktop.setAttribute('aria-pressed', String(state.view === 'desktop'));
        elements.mobile.setAttribute('aria-pressed', String(state.view === 'mobile'));
      }

      function select(index, updateHash = true) {
        state.selected = (index + config.candidates.length) % config.candidates.length;
        const candidate = candidateAt(state.selected);
        const baseWidth = state.view === 'mobile' ? candidate.mobileWidth : candidate.desktopWidth;
        const shownWidth = Math.round(baseWidth * state.scale * 10) / 10;
        const scalePercent = Math.round(state.scale * 100);
        elements.live.src = candidate.asset;
        elements.live.alt = `${candidate.code} ${candidate.name}`;
        elements.live.style.width = `${shownWidth}px`;
        elements.metaCode.textContent = `${candidate.code} / ${candidate.name}`;
        elements.metaSize.textContent = state.scale === 1
          ? `${state.view} width · ${baseWidth}px`
          : `${state.view} inspection · ${shownWidth}px · ${scalePercent}%`;
        elements.scaleReset.textContent = `${scalePercent}%`;
        elements.scaleReset.setAttribute('aria-label', `Candidate scale ${scalePercent} percent. Reset to 100 percent`);
        elements.scaleDown.disabled = state.scale <= .5;
        elements.scaleUp.disabled = state.scale >= 2;
        elements.dock.textContent = `${candidate.code}  ${String(state.selected + 1).padStart(2, '0')}/${config.candidates.length}`;
        document.querySelectorAll('.card').forEach((card, cardIndex) => card.setAttribute('aria-pressed', String(cardIndex === state.selected)));
        if (updateHash) history.replaceState(null, '', `#${candidate.code}`);
      }

      function setScale(nextScale) {
        state.scale = clampScale(nextScale);
        select(state.selected);
      }

      function setView(view) {
        state.view = view;
        applyView();
        select(state.selected);
      }

      function makeSample(candidate, view) {
        const width = view === 'mobile' ? candidate.mobileWidth : candidate.desktopWidth;
        const sample = document.createElement('span');
        sample.className = 'sample';
        sample.innerHTML = `<span>${view.toUpperCase()} ${width}px</span><img src="${candidate.asset}" alt="" style="width:${width}px">`;
        return sample;
      }

      config.candidates.forEach((candidate, index) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = 'card';
        card.setAttribute('aria-pressed', 'false');
        card.setAttribute('aria-label', `Show ${candidate.code} ${candidate.name} in context`);
        card.innerHTML = `
          <span class="card-head">
            <span><span class="card-code">${candidate.code}</span><strong class="card-name">${candidate.name}</strong></span>
            <span class="card-note">${candidate.note}</span>
          </span>
          <span class="master"><img src="${candidate.asset}" alt=""></span>
          <span class="samples"></span>`;
        const samples = card.querySelector('.samples');
        samples.append(makeSample(candidate, 'desktop'), makeSample(candidate, 'mobile'));
        card.addEventListener('click', () => select(index));
        elements.grid.append(card);
      });

      elements.title.textContent = config.title;
      elements.subtitle.textContent = config.subtitle;
      elements.frame.src = config.context.url;
      elements.frame.title = config.context.label;

      elements.desktop.addEventListener('click', () => setView('desktop'));
      elements.mobile.addEventListener('click', () => setView('mobile'));
      elements.scaleDown.addEventListener('click', () => setScale(state.scale - .1));
      elements.scaleReset.addEventListener('click', () => setScale(1));
      elements.scaleUp.addEventListener('click', () => setScale(state.scale + .1));
      document.querySelector('#hide-panel').addEventListener('click', () => elements.panel.classList.add('is-hidden'));
      document.querySelector('#show-panel').addEventListener('click', () => {
        elements.panel.classList.remove('is-hidden');
        requestAnimationFrame(() => elements.grid.children[state.selected]?.scrollIntoView({ block: 'nearest' }));
      });
      document.querySelector('#previous').addEventListener('click', () => select(state.selected - 1));
      document.querySelector('#next').addEventListener('click', () => select(state.selected + 1));

      document.addEventListener('keydown', event => {
        if (event.target instanceof HTMLInputElement || event.target instanceof HTMLTextAreaElement || event.target instanceof HTMLSelectElement || event.target?.isContentEditable) return;
        if (event.key === 'ArrowUp') { event.preventDefault(); select(state.selected - 1); }
        if (event.key === 'ArrowDown') { event.preventDefault(); select(state.selected + 1); }
        if (event.key === '+' || event.key === '=') { event.preventDefault(); setScale(state.scale + .1); }
        if (event.key === '-') { event.preventDefault(); setScale(state.scale - .1); }
        if (event.key === '0') { event.preventDefault(); setScale(1); }
      });

      const hashCode = decodeURIComponent(location.hash.slice(1)).toUpperCase();
      const hashIndex = config.candidates.findIndex(candidate => candidate.code === hashCode);
      if (hashIndex >= 0) state.selected = hashIndex;
      applyView();
      select(state.selected, false);
    })();
  </script>
</body>
</html>

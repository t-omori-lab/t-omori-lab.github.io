<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title description">
  <title id="title">修正版作例を掲示した利用場面モックアップ</title>
  <desc id="description">大学の廊下に複数の掲示物が並び、中央に主役を変えたAIデザイン体験の修正版作例が掲示された合成場面</desc>
  <defs>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#27251f" flood-opacity="0.24"/>
    </filter>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ddd7ca"/>
      <stop offset="1" stop-color="#aaa496"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#wall)"/>
  <rect y="584" width="1200" height="216" fill="#66635c"/>
  <path d="M0 584H1200M0 626H1200" stroke="#f6f1e7" stroke-opacity="0.35" stroke-width="3"/>
  <g opacity="0.8" filter="url(#shadow)">
    <rect x="54" y="170" width="210" height="300" fill="#f7f4ec"/>
    <rect x="80" y="205" width="155" height="32" fill="#c46a91"/>
    <rect x="80" y="260" width="120" height="12" fill="#69665e"/>
    <rect x="80" y="287" width="150" height="8" fill="#b7b1a5"/>
    <circle cx="159" cy="383" r="52" fill="#e6d34b"/>
  </g>
  <g opacity="0.72" filter="url(#shadow)">
    <rect x="936" y="150" width="205" height="285" fill="#f7f4ec"/>
    <rect x="963" y="181" width="150" height="70" fill="#283f54"/>
    <rect x="963" y="278" width="126" height="13" fill="#69665e"/>
    <rect x="963" y="310" width="150" height="8" fill="#b7b1a5"/>
    <rect x="963" y="330" width="139" height="8" fill="#b7b1a5"/>
  </g>
  <g filter="url(#shadow)" transform="translate(338 78)">
    <rect width="525" height="350" fill="#1748c6"/>
    <circle cx="442" cy="54" r="112" fill="#f4e538"/>
    <path d="M0 275L316 350H0Z" fill="#161613"/>
    <text x="30" y="36" fill="#fffdf8" font-family="Arial, sans-serif" font-size="10" font-weight="700" letter-spacing="2">AI × DESIGN LAB / REVISION SAMPLE</text>
    <text x="29" y="112" fill="#f4e538" font-family="Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-size="18" font-weight="700">高校生のための、90分体験。</text>
    <text x="27" y="205" fill="#fffdf8" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="61" font-weight="600" letter-spacing="-4">試してみる。</text>
    <rect x="31" y="230" width="280" height="42" rx="21" fill="#f4e538"/>
    <text x="47" y="257" fill="#161613" font-family="Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-size="13" font-weight="700">考える → 選ぶ → AIでつくる</text>
    <text x="34" y="312" fill="#fffdf8" font-family="Hiragino Kaku Gothic ProN, Yu Gothic, sans-serif" font-size="12" font-weight="700">コードが書けなくても、最初の一案から。</text>
  </g>
  <rect x="22" y="716" width="370" height="48" rx="24" fill="#161613"/>
  <text x="207" y="747" fill="#fffdf8" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="1" text-anchor="middle">REVISION SAMPLE MOCKUP / 修正版合成作例</text>
</svg>

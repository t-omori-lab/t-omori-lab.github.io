<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Design Lab — Identity Study R1</title>
  <style>
    :root { color-scheme: dark; --ink:#f6f7fb; --blue:#2d5bff; --line:rgba(255,255,255,.16); --panel:#090a0f; }
    * { box-sizing:border-box; }
    html,body { width:100%; height:100%; margin:0; overflow:hidden; background:#000; color:var(--ink); font-family:"Helvetica Neue",Helvetica,sans-serif; }
    .stage { position:fixed; inset:0; background:#000; }
    .mock { width:100%; height:100%; border:0; pointer-events:none; }
    .veil { position:absolute; inset:0; pointer-events:none; background:linear-gradient(180deg,rgba(0,0,0,.04),transparent 28%); }
    .live-logo { position:absolute; z-index:3; left:28px; top:22px; width:151px; height:auto; filter:drop-shadow(0 0 8px rgba(0,0,0,.55)); transition:width .22s ease,opacity .2s ease; }
    .live-logo.is-large { width:302px; }
    .live-logo.is-mono .accent { fill:#fff!important; stroke:#fff!important; }
    .live-logo.is-mono .accent-line { stroke:#fff!important; }
    .meta { position:absolute; top:76px; right:28px; z-index:4; text-align:right; pointer-events:none; }
    .meta b { display:block; font:600 11px/1.2 "SFMono-Regular",Consolas,monospace; letter-spacing:.14em; }
    .meta span { color:#8d91a0; font-size:10px; letter-spacing:.08em; }
    .panel { position:fixed; z-index:10; left:16px; right:16px; bottom:16px; max-height:46vh; background:rgba(7,8,12,.94); border:1px solid var(--line); backdrop-filter:blur(22px); box-shadow:0 22px 80px rgba(0,0,0,.5); transition:transform .32s cubic-bezier(.2,.8,.2,1); }
    .panel.is-hidden { transform:translateY(calc(100% + 20px)); }
    .panel-head { height:50px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; border-bottom:1px solid var(--line); }
    .title { display:flex; gap:14px; align-items:baseline; }
    .title strong { font-size:13px; letter-spacing:.05em; }
    .title span { color:#858a99; font:500 10px/1 "SFMono-Regular",Consolas,monospace; letter-spacing:.12em; }
    .tools { display:flex; gap:6px; }
    button { color:inherit; background:transparent; border:1px solid var(--line); font:600 10px/1 "SFMono-Regular",Consolas,monospace; letter-spacing:.08em; padding:8px 10px; cursor:pointer; }
    button:hover,button[aria-pressed="true"] { border-color:#fff; background:#fff; color:#05060a; }
    .grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); overflow:auto; max-height:calc(46vh - 50px); }
    .card { position:relative; min-height:105px; padding:13px 12px 11px; text-align:left; border:0; border-right:1px solid var(--line); border-bottom:1px solid var(--line); }
    .card:hover { color:inherit; background:rgba(255,255,255,.045); }
    .card[aria-pressed="true"] { color:inherit; background:rgba(45,91,255,.13); box-shadow:inset 0 0 0 1px #496fff; }
    .card svg { width:100%; height:57px; display:block; }
    .card-foot { display:flex; justify-content:space-between; align-items:center; margin-top:7px; }
    .card-foot b { font:600 9px/1 "SFMono-Regular",Consolas,monospace; letter-spacing:.12em; }
    .card-foot span { color:#7e8391; font-size:9px; }
    .open-panel { position:fixed; z-index:9; left:16px; bottom:16px; display:none; background:#fff; color:#05060a; }
    .panel.is-hidden + .open-panel { display:block; }
    .glyph { fill:#f7f8fb; }
    .stroke { fill:none; stroke:#f7f8fb; stroke-width:4; stroke-linecap:square; stroke-linejoin:miter; }
    .hair { fill:none; stroke:#f7f8fb; stroke-width:2; }
    .accent { fill:#315cff; }
    .accent-line { fill:none; stroke:#315cff; stroke-width:5; }
    .word { fill:#f7f8fb; font-family:"Helvetica Neue",Helvetica,sans-serif; font-size:29px; letter-spacing:-1.4px; }
    .word-heavy { font-weight:700; }
    .word-light { font-weight:400; }
    .micro { fill:#f7f8fb; font-family:"SFMono-Regular",Consolas,monospace; font-size:12px; letter-spacing:1.2px; }
    @media (max-width:760px) {
      .live-logo { left:18px; top:17px; width:132px; }
      .live-logo.is-large { width:220px; }
      .meta { display:none; }
      .panel { left:8px; right:8px; bottom:8px; max-height:54vh; }
      .grid { grid-template-columns:repeat(2,minmax(0,1fr)); max-height:calc(54vh - 50px); }
      .card { min-height:96px; }
      .tools button:nth-child(2) { display:none; }
    }
  </style>
</head>
<body>
  <main class="stage">
    <iframe class="mock" src="./" title="AI Design Lab mockup"></iframe>
    <div class="veil"></div>
    <div id="live"></div>
    <div class="meta"><b id="meta-code">A1 / CUT</b><span>ACTUAL HEADER SCALE · R1</span></div>
  </main>

  <section class="panel" id="panel" aria-label="ロゴ比較パネル">
    <div class="panel-head">
      <div class="title"><strong>AI DESIGN LAB — IDENTITY STUDY</strong><span>12 CODE-DRAWN VECTORS</span></div>
      <div class="tools">
        <button id="size" type="button" aria-pressed="false">2× SIZE</button>
        <button id="mono" type="button" aria-pressed="false">MONO</button>
        <button id="hide" type="button">HIDE</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </section>
  <button class="open-panel" id="show" type="button">SHOW STUDY</button>

  <script>
    const word = (x=114,y=57,weight='word-heavy') => `
      <text class="word ${weight}" x="${x}" y="${y}">AI Design<tspan class="word-light"> Lab</tspan></text>`;
    const stacked = (x=112,y=30) => `
      <text class="micro" x="${x}" y="${y}">AI</text>
      <text class="word word-heavy" x="${x}" y="${y+26}">Design</text>
      <text class="word word-light" x="${x}" y="${y+53}">Lab</text>`;
    const logos = [
      { code:'A1', route:'CUT / DECISIVE', svg:`
        <path class="glyph" d="M18 73 47 17h18L36 73Z"/><rect class="glyph" x="70" y="17" width="12" height="56"/>
        <path class="accent-line" d="M25 57 80 34"/>${word(108,58)}` },
      { code:'A2', route:'CUT / ABSENCE', svg:`
        <rect class="glyph" x="19" y="17" width="65" height="56"/><path d="M8 79 93 8 93 30 31 82Z" fill="#05060a"/>
        <rect class="accent" x="66" y="55" width="18" height="18"/>${word(110,58)}` },
      { code:'A3', route:'CUT / REVISION', svg:`
        <text class="word word-heavy" x="16" y="60" font-size="54">AI</text><path class="accent-line" d="M12 64 83 28"/>
        <path class="hair" d="M98 18v56"/>${word(114,58)}` },
      { code:'A4', route:'CUT / SPLIT GLYPH', svg:`
        <path class="glyph" d="M16 72 42 17h16L32 72Z M60 17h13v55H60Z"/><path d="M5 54 82 34v11L5 65Z" fill="#05060a"/>
        <rect class="accent" x="60" y="54" width="13" height="18"/>${stacked(100,22)}` },

      { code:'B1', route:'FRAME / OPEN', svg:`
        <path class="stroke" d="M16 38V17h21M83 38V17H62M16 55v20h21M83 55v20H62"/><path class="accent-line" d="M16 17h21"/>
        <circle class="glyph" cx="50" cy="46" r="6"/>${word(110,58)}` },
      { code:'B2', route:'FRAME / ONE ISSUE', svg:`
        <path class="stroke" d="M18 73V18h56M18 73h56"/><rect class="accent" x="55" y="35" width="27" height="27"/>
        <path d="M61 41h15v15H61Z" fill="#05060a"/>${word(108,58)}` },
      { code:'B3', route:'FRAME / APERTURE', svg:`
        <path class="glyph" d="M15 20h29v54H15Z M56 20h29v54H56Z"/><circle cx="50" cy="47" r="19" fill="#05060a"/>
        <rect class="accent" x="46" y="20" width="8" height="54"/>${word(110,58)}` },
      { code:'B4', route:'FRAME / CROP', svg:`
        <path class="stroke" d="M17 34V17h17M82 34V17H65M17 60v16h17M82 60v16H65"/>
        <path class="glyph" d="M28 64 50 25h12L40 64Z"/><rect class="accent" x="61" y="48" width="18" height="18"/>${stacked(106,22)}` },

      { code:'C1', route:'RANGE / EXPAND', svg:`
        <rect class="glyph" x="16" y="53" width="9" height="21"/><rect class="glyph" x="34" y="39" width="12" height="35"/><rect class="glyph" x="55" y="21" width="17" height="53"/>
        <rect class="accent" x="81" y="14" width="8" height="60"/>${word(114,58)}` },
      { code:'C2', route:'RANGE / DIVERGE', svg:`
        <path class="stroke" d="M18 72 48 18M41 72 58 42M62 72 70 58"/><path class="accent-line" d="M48 18 83 18"/>
        <circle class="accent" cx="83" cy="18" r="6"/>${word(112,58)}` },
      { code:'C3', route:'RANGE / SELECT', svg:`
        <circle class="glyph" cx="18" cy="48" r="7"/><path class="hair" d="M25 48 69 22M25 48h44M25 48l44 26"/>
        <rect class="accent" x="69" y="37" width="22" height="22"/>${stacked(112,22)}` },
      { code:'C4', route:'RANGE / RESOLVE', svg:`
        <path class="stroke" d="M16 65 36 45 54 61 84 25"/><circle class="glyph" cx="16" cy="65" r="6"/>
        <rect class="accent" x="76" y="17" width="16" height="16"/>${word(112,58)}` },
    ];

    const wrap = (body, extra='') => `<svg class="${extra}" viewBox="0 0 420 96" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Design Lab">${body}</svg>`;
    const live = document.querySelector('#live');
    const grid = document.querySelector('#grid');
    const metaCode = document.querySelector('#meta-code');
    let selected = 0;

    function choose(index) {
      selected = index;
      live.innerHTML = wrap(logos[index].svg,'live-logo');
      metaCode.textContent = `${logos[index].code} / ${logos[index].route}`;
      document.querySelectorAll('.card').forEach((card,i) => card.setAttribute('aria-pressed',String(i===index)));
      live.querySelector('svg').classList.toggle('is-large',document.querySelector('#size').getAttribute('aria-pressed')==='true');
      live.querySelector('svg').classList.toggle('is-mono',document.querySelector('#mono').getAttribute('aria-pressed')==='true');
    }

    logos.forEach((logo,index) => {
      const button = document.createElement('button');
      button.type='button'; button.className='card'; button.setAttribute('aria-pressed','false');
      button.innerHTML = `${wrap(logo.svg)}<span class="card-foot"><b>${logo.code}</b><span>${logo.route}</span></span>`;
      button.addEventListener('click',()=>choose(index)); grid.appendChild(button);
    });

    document.querySelector('.mock').addEventListener('load',event => {
      try {
        const style = event.target.contentDocument.createElement('style');
        style.textContent = '.lab-home-logotype{opacity:0!important}';
        event.target.contentDocument.head.appendChild(style);
      } catch (_) {}
    });
    document.querySelector('#size').addEventListener('click',event => {
      const on=event.target.getAttribute('aria-pressed')!=='true'; event.target.setAttribute('aria-pressed',String(on)); choose(selected);
    });
    document.querySelector('#mono').addEventListener('click',event => {
      const on=event.target.getAttribute('aria-pressed')!=='true'; event.target.setAttribute('aria-pressed',String(on)); choose(selected);
    });
    document.querySelector('#hide').addEventListener('click',()=>document.querySelector('#panel').classList.add('is-hidden'));
    document.querySelector('#show').addEventListener('click',()=>document.querySelector('#panel').classList.remove('is-hidden'));
    choose(0);
  </script>
</body>
</html>

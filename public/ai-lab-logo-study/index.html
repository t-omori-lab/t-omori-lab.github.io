<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Design Lab — Site Fit Study</title>
  <link rel="icon" href="./context/favicon.svg" type="image/svg+xml" />
  <style>
    :root {
      color-scheme: dark;
      --black:#020309;
      --panel:rgba(6,7,11,.95);
      --white:#f8f8f4;
      --cobalt:#2555ff;
      --acid:#e9ff5b;
      --muted:#888c98;
      --line:rgba(255,255,255,.15);
    }
    * { box-sizing:border-box; }
    html,body { width:100%; height:100%; margin:0; overflow:hidden; background:#000; color:var(--white); font-family:"Helvetica Neue",Helvetica,sans-serif; }
    button { font:inherit; }
    .stage { position:fixed; inset:0; background:#000; }
    .mock { width:100%; height:100%; border:0; pointer-events:none; }
    .veil { position:absolute; inset:0; pointer-events:none; background:linear-gradient(180deg,rgba(0,0,0,.08),transparent 30%); }
    .logo-mask { position:absolute; z-index:2; left:0; top:0; width:238px; height:76px; background:#020309; pointer-events:none; }
    .live-logo {
      position:absolute;
      z-index:3;
      left:28px;
      top:23px;
      width:160px;
      height:auto;
      overflow:visible;
      filter:drop-shadow(0 1px 7px rgba(0,0,0,.72));
      transition:width .2s cubic-bezier(.2,.8,.2,1),opacity .12s ease;
    }
    .meta { position:absolute; z-index:4; top:78px; right:28px; text-align:right; pointer-events:none; }
    .meta b { display:block; font:600 10px/1.2 "SFMono-Regular",Consolas,monospace; letter-spacing:.14em; }
    .meta span { display:block; margin-top:6px; color:var(--muted); font:500 9px/1.2 "SFMono-Regular",Consolas,monospace; letter-spacing:.12em; }

    .panel {
      position:fixed;
      z-index:10;
      left:16px;
      right:16px;
      bottom:16px;
      max-height:62vh;
      overflow:hidden;
      background:var(--panel);
      border:1px solid var(--line);
      box-shadow:0 28px 90px rgba(0,0,0,.62);
      backdrop-filter:blur(24px);
      transition:transform .3s cubic-bezier(.2,.8,.2,1);
    }
    .panel.is-hidden { transform:translateY(calc(100% + 24px)); }
    .panel-head { min-height:52px; display:flex; align-items:center; justify-content:space-between; gap:20px; padding:10px 14px 10px 16px; border-bottom:1px solid var(--line); }
    .title { min-width:0; display:flex; align-items:baseline; gap:14px; }
    .title strong { white-space:nowrap; font-size:12px; letter-spacing:.06em; }
    .title span { color:var(--muted); font:500 9px/1.2 "SFMono-Regular",Consolas,monospace; letter-spacing:.12em; }
    .tools { display:flex; flex:none; gap:6px; }
    .size-controls { display:flex; flex:none; }
    .tool,.open-panel,.candidate-nav {
      border:1px solid var(--line);
      color:inherit;
      background:transparent;
      padding:8px 10px;
      cursor:pointer;
      font:600 9px/1 "SFMono-Regular",Consolas,monospace;
      letter-spacing:.08em;
    }
    .tool:hover,.tool[aria-pressed="true"],.candidate-nav:hover { border-color:var(--white); background:var(--white); color:var(--black); }
    .size-control { min-width:34px; height:32px; padding:0 9px; }
    .size-control + .size-control { border-left:0; }
    .size-value { min-width:52px; color:var(--acid); }
    .size-value:hover { color:var(--black); }
    .tool:disabled { color:#555a66; cursor:not-allowed; }
    .tool:disabled:hover { border-color:var(--line); background:transparent; color:#555a66; }

    .locked {
      display:flex;
      justify-content:space-between;
      gap:16px;
      padding:8px 16px;
      border-bottom:1px solid var(--line);
      color:#a7abb5;
      font:500 9px/1.25 "SFMono-Regular",Consolas,monospace;
      letter-spacing:.1em;
    }
    .locked b { color:var(--acid); font-weight:600; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); max-height:calc(62vh - 85px); overflow:auto; }
    .card {
      min-width:0;
      min-height:178px;
      padding:14px 14px 12px;
      border:0;
      border-right:1px solid var(--line);
      color:inherit;
      background:transparent;
      text-align:left;
      cursor:pointer;
    }
    .card:last-child { border-right:0; }
    .card:hover { background:rgba(255,255,255,.035); }
    .card[aria-pressed="true"] { background:rgba(37,85,255,.12); box-shadow:inset 0 0 0 1px #4d70ff; }
    .card-head { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; }
    .card-code { color:var(--cobalt); font:700 10px/1.2 "SFMono-Regular",Consolas,monospace; letter-spacing:.12em; }
    .card-name { display:block; margin-top:4px; font-size:12px; font-weight:700; letter-spacing:.025em; }
    .card-note { max-width:145px; color:var(--muted); font-size:9px; line-height:1.45; text-align:right; }
    .master { height:76px; margin-top:8px; display:flex; align-items:center; justify-content:center; background:var(--black); overflow:hidden; }
    .master svg { width:min(94%,360px); height:66px; overflow:visible; }
    .samples { display:flex; align-items:flex-end; gap:18px; margin-top:10px; min-height:34px; overflow:hidden; }
    .sample { min-width:0; }
    .sample span { display:block; margin-bottom:5px; color:#777b87; font:500 8px/1 "SFMono-Regular",Consolas,monospace; letter-spacing:.08em; }
    .sample svg { display:block; height:auto; overflow:visible; }
    .sample.desktop svg,.sample.mobile svg { max-height:40px; }
    .study-dock {
      position:fixed;
      z-index:9;
      left:16px;
      bottom:16px;
      display:none;
      align-items:stretch;
      background:rgba(6,7,11,.96);
      border:1px solid var(--line);
      box-shadow:0 16px 50px rgba(0,0,0,.48);
      backdrop-filter:blur(20px);
    }
    .panel.is-hidden + .study-dock { display:flex; }
    .open-panel { position:static; display:block; border:0; background:var(--white); color:var(--black); }
    .candidate-nav { width:34px; min-height:32px; padding:0; border-width:0 0 0 1px; font-size:15px; line-height:1; }
    .dock-status {
      display:flex;
      align-items:center;
      min-width:82px;
      padding:0 10px;
      border-left:1px solid var(--line);
      color:#a7abb5;
      font:600 8px/1 "SFMono-Regular",Consolas,monospace;
      letter-spacing:.1em;
      white-space:nowrap;
    }

    @media (max-width:760px) {
      .logo-mask { width:218px; height:74px; }
      .live-logo { left:24px; top:23px; width:132px; }
      .meta { display:none; }
      .panel { left:8px; right:8px; bottom:8px; max-height:59vh; overflow:hidden; }
      .study-dock { left:8px; bottom:8px; }
      .panel-head { align-items:center; gap:8px; padding-right:8px; }
      .title { display:block; }
      .title strong { font-size:10px; }
      .title span { display:none; }
      .tools { gap:4px; }
      .size-control { min-width:30px; height:30px; padding:0 6px; }
      .size-value { min-width:44px; }
      .locked { display:none; }
      .grid { grid-template-columns:1fr; max-height:calc(59vh - 53px); overflow:auto; }
      .card { min-height:158px; border-right:0; border-bottom:1px solid var(--line); }
      .card:last-child { border-bottom:0; }
      .master { height:66px; }
      .master svg { height:58px; }
    }

    @media (prefers-reduced-motion:reduce) {
      .live-logo,.panel { transition:none; }
    }
  </style>
</head>

          <button class="tool size-control" id="size-up" type="button" aria-label="ロゴを10%拡大" title="10%拡大">＋</button>
        </div>
        <button class="tool" id="hide" type="button">HIDE</button>
      </div>
    </div>
    <div class="locked">
      <span><b>LOCKED</b> HEADER CONTEXT / DARK BACKGROUND / VISUAL HEIGHT</span>
      <span><b>VARIABLE</b> PER-CANDIDATE WIDTH / LOCKUP</span>
    </div>
    <div class="grid" id="grid"></div>

      if (variant === 'c1') return `<text x="287" y="149" ${common} font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="58" font-weight="620" letter-spacing="-2">AI Design Lab</text>`;
      if (variant === 'c2') return `<text x="309" y="128" ${common} font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="54" font-weight="540" letter-spacing="-1.8"><tspan x="309" y="128">AI Design</tspan><tspan x="309" y="178">Lab</tspan></text>`;
      if (variant === 'c3') return `<text x="300" y="132" ${common} font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="38" font-weight="520" letter-spacing="7"><tspan x="300" y="132">AI DESIGN</tspan><tspan x="300" y="178">LAB</tspan></text>`;
      if (variant === 'c4') return `<g transform="translate(300 0) scale(.72 1)"><text x="0" y="130" ${common} font-family="Arial Narrow, Helvetica Neue, Arial, sans-serif" font-size="51" font-weight="700" letter-spacing=".4"><tspan x="0" y="130">AI DESIGN</tspan><tspan x="0" y="178">LAB</tspan></text></g>`;
      return `<text x="305" y="149" ${common} font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="55" font-weight="600" letter-spacing="-1.8">AI Design Lab</text>`;
    }

    function lockedMarkSvg(candidate,prefix,klass='',style='') {
      const styleAttribute = style ? ` style="${style}"` : '';
      const clipId = `${prefix}-locked-mark`;
      const markAsset = candidate.center === 'star'
        ? './assets/selected-logo-03.png'
        : './assets/selected-logo-03-starless.png';
      const centerSymbol = candidate.center === 'white-dot'
        ? '<circle cx="126" cy="149" r="13.5" fill="#fff"/>'
        : candidate.center === 'lime-dot'
          ? '<circle cx="126" cy="149" r="13.5" fill="#d8ff00"/>'
          : candidate.center === 'white-ring'
            ? '<circle cx="126" cy="149" r="13.5" fill="none" stroke="#fff" stroke-width="3"/>'
            : '';
      return `<svg class="${klass}"${styleAttribute} viewBox="0 0 ${candidate.width} ${candidate.height}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Design Lab — ${candidate.name}"><defs><clipPath id="${clipId}"><rect x="0" y="0" width="231" height="226"/></clipPath></defs><image href="${markAsset}" x="0" y="0" width="623" height="226" clip-path="url(#${clipId})"/>${centerSymbol}${lockedMarkType(candidate.variant)}</svg>`;
    }

    function logoSvg(candidate,prefix,klass='',style='') {
      if (candidate.lockedMark) return lockedMarkSvg(candidate,prefix,klass,style);
      const styleAttribute = style ? ` style="${style}"` : '';
      if (candidate.asset) {
        return `<svg class="${klass}"${styleAttribute} viewBox="0 0 ${candidate.width} ${candidate.height}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Design Lab — ${candidate.name}"><image href="${candidate.asset}" x="0" y="0" width="${candidate.width}" height="${candidate.height}" preserveAspectRatio="xMidYMid meet"/></svg>`;
      }
      const spectrumId = `${prefix}-spectrum`;
      const seamId = `${prefix}-seam`;
      const edgeId = `${prefix}-edge`;
      const softId = `${prefix}-soft`;
      const defs = `<defs>
        <linearGradient id="${spectrumId}" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#25d8ff"/>
          <stop offset=".46" stop-color="#f8f7f2"/>
          <stop offset=".73" stop-color="#8266ff"/>
          <stop offset="1" stop-color="#ff168f"/>
        </linearGradient>
        <clipPath id="${seamId}"><rect x="0" y="39" width="330" height="2.4"/></clipPath>
        <clipPath id="${edgeId}"><rect x="0" y="47" width="330" height="8"/></clipPath>
        <filter id="${softId}" x="-8%" y="-30%" width="116%" height="170%"><feGaussianBlur stdDeviation=".65"/></filter>
      </defs>`;
      const seam = candidate.treatment === 'seam'
        ? logoText(`url(#${spectrumId})`,`clip-path="url(#${seamId})"`)
        : '';
      const refraction = candidate.treatment === 'refract'
        ? `${logoText(`url(#${spectrumId})`,`transform="translate(0 1.5)" opacity=".72" filter="url(#${softId})" clip-path="url(#${edgeId})"`)}${logoText(`url(#${spectrumId})`,`clip-path="url(#${seamId})" opacity=".74"`)}`
        : '';
      return `<svg class="${klass}"${styleAttribute} viewBox="0 0 330 70" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI Design Lab — ${candidate.name}">${defs}${refraction}${logoText('#f8f7f2')}${seam}</svg>`;
    }

    const live = document.querySelector('#live');
    const grid = document.querySelector('#grid');
    const metaCode = document.querySelector('#meta-code');
    const metaScale = document.querySelector('#meta-scale');
    const panel = document.querySelector('#panel');
    const dockStatus = document.querySelector('#dock-status');
    const sizeDown = document.querySelector('#size-down');
    const sizeReset = document.querySelector('#size-reset');
    const sizeUp = document.querySelector('#size-up');
    const minScale = .5;
    const maxScale = 2;
    const scaleStep = .1;
    let selected = 0;
    let scale = 1;

    function setScale(nextScale) {
      scale = Math.min(maxScale,Math.max(minScale,Math.round(nextScale * 10) / 10));
      choose(selected);
    }

    function choose(index) {
      selected = index;
      const candidate = candidates[index];
      live.innerHTML = logoSvg(candidate,`live-${candidate.code}`,'live-logo');
      const mobile = window.matchMedia('(max-width:760px)').matches;
      const baseWidth = mobile ? candidate.mobileWidth : candidate.headerWidth;
      const renderedWidth = Math.round(baseWidth * scale * 10) / 10;
      const scalePercent = Math.round(scale * 100);
      live.querySelector('svg').style.width = `${renderedWidth}px`;
      metaCode.textContent = `${candidate.code} / ${candidate.name}`;
      metaScale.textContent = scale === 1
        ? `ACTUAL HEADER WIDTH · ${baseWidth} PX`
        : `INSPECTION WIDTH · ${renderedWidth} PX · ${scalePercent}%`;
      sizeReset.textContent = `${scalePercent}%`;
      sizeReset.setAttribute('aria-label',`表示サイズ${scalePercent}%。100%に戻す`);
      sizeDown.disabled = scale <= minScale;
      sizeUp.disabled = scale >= maxScale;
      dockStatus.textContent = `${candidate.code}  ${String(index + 1).padStart(2,'0')}/${candidates.length}`;
      document.querySelectorAll('.card').forEach((card,i) => card.setAttribute('aria-pressed',String(i === index)));
    }

    function stepCandidate(direction) {
      choose((selected + direction + candidates.length) % candidates.length);
    }

    candidates.forEach((candidate,index) => {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'card';
      card.setAttribute('aria-pressed','false');
      card.setAttribute('aria-label',`${candidate.code} ${candidate.name}を実寸表示`);
      card.innerHTML = `
        <span class="card-head">
          <span><span class="card-code">${candidate.code}</span><strong class="card-name">${candidate.name}</strong></span>
          <span class="card-note">${candidate.note}</span>
        </span>
        <span class="master">${logoSvg(candidate,`master-${candidate.code}`)}</span>
        <span class="samples">
          <span class="sample desktop"><span>DESKTOP ${candidate.headerWidth} PX</span>${logoSvg(candidate,`desk-${candidate.code}`,'',`width:${candidate.headerWidth}px`)}</span>
          <span class="sample mobile"><span>MOBILE ${candidate.mobileWidth} PX</span>${logoSvg(candidate,`mobile-${candidate.code}`,'',`width:${candidate.mobileWidth}px`)}</span>
        </span>`;
      card.addEventListener('click',() => choose(index));
      grid.appendChild(card);
    });

    document.querySelector('.mock').addEventListener('load',event => {
      try {
        const style = event.target.contentDocument.createElement('style');
        style.textContent = '.lab-home-logotype{opacity:0!important}';
        event.target.contentDocument.head.appendChild(style);
      } catch (_) {}
    });

    sizeDown.addEventListener('click',() => setScale(scale - scaleStep));
    sizeReset.addEventListener('click',() => setScale(1));
    sizeUp.addEventListener('click',() => setScale(scale + scaleStep));
    document.querySelector('#hide').addEventListener('click',() => panel.classList.add('is-hidden'));
    document.querySelector('#show').addEventListener('click',() => {
      panel.classList.remove('is-hidden');
      requestAnimationFrame(() => grid.children[selected]?.scrollIntoView({ block:'nearest' }));
    });
    document.querySelector('#previous').addEventListener('click',() => stepCandidate(-1));
    document.querySelector('#next').addEventListener('click',() => stepCandidate(1));
    window.addEventListener('resize',() => choose(selected));
    choose(0);
  </script>
</body>
</html>
